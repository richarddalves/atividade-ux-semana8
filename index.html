<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeira do Brasil</title>
    <script src="src/d3.v7.js"></script>
    <style>
        #legenda {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 26, 51, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            font-family: sans-serif;
            font-size: 13px;
            max-width: 230px;
            z-index: 10;
            line-height: 1.6;
        }
        #legenda h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 6px;
        }
        #legenda ul {
            margin: 0 0 8px 0;
            padding-left: 16px;
        }
        #legenda li {
            margin-bottom: 2px;
        }
        #legenda .dicas {
            margin: 0;
            font-size: 11px;
            opacity: 0.6;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 6px;
        }
    </style>
</head>
<body>
    <svg id="aviso-javascript" style="position:absolute; top:10px; left:10px;" width="100%" height="40">
        <text x="0" y="20">
            Você precisa permitir o Javascript no seu navegador
        </text>
    </svg>

    <div id="legenda">
        <h3>Bandeira do Brasil</h3>
        <ul>
            <li><span class="cor verde"></span> Verde - as matas do país</li>
            <li><span class="cor amarelo"></span> Amarelo - o ouro brasileiro</li>
            <li><span class="cor azul"></span> Azul - o céu do Rio de Janeiro</li>
            <li><span class="cor branco"></span> Faixa - "Ordem e Progresso"</li>
        </ul>
        <p class="dicas">
            Clique em uma parte da bandeira e balance para mexer o conteúdo interno · Arraste a bandeira fora da seleção · Scroll para zoom
        </p>
    </div>

    <script src="src/script.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
